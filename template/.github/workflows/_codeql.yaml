name: CodeQL
on:
  workflow_call:
    inputs:
      language:
        description: "CodeQL language to analyze (e.g. cpp, go, rust)"
        required: true
        type: string
      build-command:
        description: "Command to build the project (required for C++/Rust)"
        required: false
        type: string
        default: ""
jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ inputs.language }}
          build-mode: ${{ inputs.build-command != '' && 'manual' || 'none' }}
      - name: Build
        if: ${{ inputs.build-command != '' }}
        run: ${{ inputs.build-command }}
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ inputs.language }}
